<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lode Runner Clone — clean-room single file</title>
<!--
  ============================================================================
  Clean-room Lode Runner recreation in one HTML file.

  Behavior was reimplemented from written observation notes (research-notes.md):
   - Rules/timing observed in SimonHung/LodeRunner_TotalRecall (studied, not
     copied; that repo credits the AI policy to the BNN book "玩 Lode Runner
     學 C 語言"). No code, art, sound, or level data is taken from it.
   - Look & feel calibrated against the 1984 Macintosh port video
     (youtube PGUBbduTE6Y) for the "mono" theme; OS menu/window chrome is
     intentionally NOT reproduced.
   - All level layouts here are original designs.

  Architecture (per progress.md):
    Profile / LevelModel / ActorState / MovementSystem / DigSystem /
    GuardSystem / Campaign / Renderer+Themes / AudioSystem / GameStateMachine

  Level format (extensible):
    A level is an object { name, map } where map is an array of 16 strings,
    up to 28 chars (shorter rows are space-padded). Charset (a de-facto
    community convention for Lode Runner maps):
      ' ' empty   '#' diggable brick   '@' solid brick   'H' ladder
      '-' bar     'X' false brick      'S' hidden exit ladder
      '$' gold    '0' guard (max 5)    '&' runner (exactly one)
    Add packs at the bottom via registerLevelPack(name, levels) or store a
    JSON array of {name, map} under localStorage key "clone_custom_levels".

  Keys: arrows move · Z/X dig left/right · Space dig ahead · P pause
        R abort (costs a life) · , / . prev/next level · T theme · M sound
  ============================================================================
-->
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #101014;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh;
    font-family: ui-monospace, Menlo, Consolas, monospace;
  }
  #stage {
    image-rendering: pixelated;
    max-width: 98vw; max-height: 92vh;
    /* keep aspect */
    width: auto; height: auto;
  }
  #help {
    color: #8a8a96; font-size: 12px; padding: 6px 10px; text-align: center;
    letter-spacing: 0.5px; line-height: 1.6;
  }
  #help b { color: #c8c8d4; font-weight: 600; }
</style>
</head>
<body>
<canvas id="stage" width="1120" height="768"></canvas>
<div id="help">
  <b>&larr;&uarr;&darr;&rarr;</b> move &nbsp; <b>Z</b>/<b>X</b> dig &nbsp;
  <b>Space</b> dig ahead &nbsp; <b>P</b> pause &nbsp; <b>R</b> abort &nbsp;
  <b>,</b>/<b>.</b> level &nbsp; <b>T</b> theme &nbsp; <b>M</b> sound
</div>
<script>
"use strict";

/* ==========================================================================
 * Profile — board metrics and timing.
 * Numbers are behavioral measurements documented in research-notes.md:
 * 28x16 board, 40x44 logical tile, 23 ticks/s, 8 px/tick horizontal,
 * 9 px/tick vertical, hole open ~166 ticks, fill 8+8+4, shake 51+15,
 * reborn 8 ticks, dig ~11 ticks.
 * ======================================================================== */
const Profile = {
  cols: 28, rows: 16,
  tileW: 40, tileH: 44,
  tickHz: 23,
  moveX: 8, moveY: 9,               // per-tick step in logical px
  digTicks: 11,                     // dig animation length
  digCancelFrame: 8,                // guard on hole before this frame => cancel
  holeOpenTicks: 166,               // hole stays open
  fillTicks: [8, 8, 4],             // three refill stages
  shakeStillTicks: 51,              // trapped guard sits still
  shakeAnimTicks: [3, 3, 3, 3, 3],  // then shakes
  rebornTicks: 8,
  goldDropMin: 12, goldDropMax: 37, // guard carries gold for N boundary steps
  lives: 5, maxLives: 100,
  scoreGold: 250, scoreTrap: 75, scoreGuardDead: 75, scoreLevel: 1500,
  maxGuards: 5,
  groundH: 16, statusH: 48,
};
Profile.playW = Profile.cols * Profile.tileW;   // 1120
Profile.playH = Profile.rows * Profile.tileH;   // 704

const T = { EMPTY:0, BRICK:1, SOLID:2, LADDER:3, BAR:4, TRAP:5, HLADDER:6, GOLD:7 };
const CHARSET = { " ":T.EMPTY, "#":T.BRICK, "@":T.SOLID, "H":T.LADDER,
                  "-":T.BAR, "X":T.TRAP, "S":T.HLADDER, "$":T.GOLD };

const A = { STOP:0, LEFT:1, RIGHT:2, UP:3, DOWN:4, FALL:5, FALLBAR:6,
            DIGL:7, DIGR:8, INHOLE:9, CLIMB:10, REBORN:11 };

const HW = Profile.tileW >> 1, HH = Profile.tileH >> 1;   // half tile (20/22)
const QW = Profile.tileW >> 2, QH = Profile.tileH >> 2;   // quarter tile (10/11)

/* ==========================================================================
 * Campaign — original authored levels + extension hooks.
 * ======================================================================== */
const LevelPacks = [];
function registerLevelPack(packName, levels) {
  const clean = [];
  for (const lv of levels) {
    const map = (lv.map || lv).slice(0, Profile.rows);
    while (map.length < Profile.rows) map.push("");
    clean.push({ name: lv.name || packName, map: map.map(r =>
      (r.length > Profile.cols ? r.slice(0, Profile.cols) : r.padEnd(Profile.cols))) });
  }
  LevelPacks.push({ packName, levels: clean });
  return clean.length;
}
function campaignLevels() {
  const all = [];
  for (const p of LevelPacks) all.push(...p.levels);
  return all;
}

/* ==========================================================================
 * LevelModel — immutable base terrain + mutable active terrain.
 * base: terrain incl. gold and hidden ladders.
 * act : live terrain (holes become EMPTY, hidden ladder EMPTY until revealed).
 * Actor occupancy is looked up from actor state, not stored in the grid.
 * ======================================================================== */
class LevelModel {
  constructor(levelDef) {
    this.name = levelDef.name;
    this.base = []; this.act = []; this.revealTrap = [];
    this.goldCount = 0; this.goldDone = false;
    this.runnerStart = null; this.guardStarts = [];
    for (let y = 0; y < Profile.rows; y++) {
      const b = [], a = [], rv = [];
      for (let x = 0; x < Profile.cols; x++) {
        const ch = levelDef.map[y][x];
        let t = CHARSET[ch]; rv.push(false);
        if (t === undefined) {
          if (ch === "&") this.runnerStart = { x, y };
          else if (ch === "0") this.guardStarts.push({ x, y });
          t = T.EMPTY;
        }
        if (t === T.GOLD) this.goldCount++;
        b.push(t);
        a.push(t === T.GOLD || t === T.HLADDER ? T.EMPTY : t);
      }
      this.base.push(b); this.act.push(a); this.revealTrap.push(rv);
    }
    if (!this.runnerStart) this.runnerStart = { x: 0, y: Profile.rows - 2 };
    this.guardStarts = this.guardStarts.slice(0, Profile.maxGuards);
  }
  inside(x, y) { return x >= 0 && x < Profile.cols && y >= 0 && y < Profile.rows; }
  baseAt(x, y) { return this.inside(x, y) ? this.base[y][x] : T.SOLID; }
  actAt(x, y)  { return this.inside(x, y) ? this.act[y][x]  : T.SOLID; }
  // goldCount tracks gold the RUNNER has yet to collect. Guards picking up,
  // carrying, and dropping gold never change it (classic rule): the exit
  // must not appear while a guard still holds collectible gold. Only runner
  // collection — or destruction of carried gold — decrements it.
  removeGold(x, y) { this.base[y][x] = T.EMPTY; this.goldCount--; }
  addGold(x, y)    { this.base[y][x] = T.GOLD; }
  revealExit() {
    this.goldDone = true;
    for (let y = 0; y < Profile.rows; y++)
      for (let x = 0; x < Profile.cols; x++)
        if (this.base[y][x] === T.HLADDER) {
          this.base[y][x] = T.LADDER; this.act[y][x] = T.LADDER;
        }
  }
}

/* ==========================================================================
 * ActorState
 * pos: tile coordinate (x,y) + signed sub-tile offset in logical px.
 * Offsets commit to the neighbor tile when |offset| crosses half a tile.
 * ======================================================================== */
function makeActor(x, y, kind) {
  return { kind, x, y, xo: 0, yo: 0,
           action: A.STOP, facing: A.RIGHT, frame: 0, animT: 0,
           hasGold: 0, shakeT: 0, shakeIdx: -1, rebornT: 0,
           holeX: -1, holeY: -1, alive: true };
}

/* ==========================================================================
 * Game — owns runtime state and the systems.
 * ======================================================================== */
class Game {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext("2d");
    this.levels = campaignLevels();
    this.levelIdx = 0;
    this.score = 0;
    this.lives = Profile.lives;
    this.state = "ready";        // ready|running|dead|over|done|paused|win
    this.stateT = 0;
    this.keyAction = A.STOP;
    this.heldKeys = new Set();
    this.themeIdx = +(localStorage.getItem("clone_theme") || 0) % Themes.length;
    this.muted = localStorage.getItem("clone_muted") === "1";
    // ?theme=N&level=N — handy for testing and screenshots
    if (typeof location !== "undefined" && location.search) {
      const q = new URLSearchParams(location.search);
      if (q.has("theme")) this.themeIdx = (+q.get("theme") || 0) % Themes.length;
      if (q.has("level")) {
        this.requestedLevel = Math.max(0, (+q.get("level") || 1) - 1);
        this.levelIdx = this.requestedLevel;
      }
    }
    this.moveOffset = 0; this.moveId = 0;   // guard scheduler cursors
    this.blink = 0;
    this.loadLevel(this.levelIdx);
  }

  /* ---------------- level lifecycle ---------------- */
  loadLevel(idx, keepScore = true) {
    this.levelIdx = (idx + this.levels.length) % this.levels.length;
    this.model = new LevelModel(this.levels[this.levelIdx]);
    const s = this.model.runnerStart;
    this.runner = makeActor(s.x, s.y, "runner");
    this.guards = this.model.guardStarts.map(g => makeActor(g.x, g.y, "guard"));
    this.holes = [];          // {x,y,phase:'dig'|'open'|'fill',t,stage,dir}
    this.digging = null;      // reference into holes while digging
    this.moveOffset = 0; this.moveId = 0;
    this.state = "ready"; this.stateT = 0;
    this.keyAction = A.STOP;
    if (!keepScore) { this.score = 0; this.lives = Profile.lives; }
  }

  // called after external level files finish probing: adopt the grown
  // campaign; honor a ?level= request that pointed past the embedded range
  refreshCampaign() {
    this.levels = campaignLevels();
    if (this.requestedLevel != null && this.state === "ready" &&
        this.requestedLevel < this.levels.length &&
        this.requestedLevel !== this.levelIdx) {
      this.loadLevel(this.requestedLevel);
    }
  }

  /* ---------------- occupancy helpers ---------------- */
  guardAt(x, y) {
    for (const g of this.guards)
      if (g.action !== A.REBORN && g.x === x && g.y === y) return g;
    return null;
  }
  // support: ladder cell, bar center, floor/ladder/guard below, or board bottom
  supported(actor) {
    const m = this.model, { x, y, yo } = actor;
    const cur = m.baseAt(x, y);
    if (cur === T.LADDER || (cur === T.BAR && yo === 0)) return true;
    if (yo < 0) return false;
    if (y >= Profile.rows - 1) return true;
    const below = m.actAt(x, y + 1);
    if (below === T.BRICK || below === T.SOLID || below === T.LADDER) return true;
    if (this.guardAt(x, y + 1)) return true;
    return false;
  }
  hardBelow(actor) { // things that stop a fall
    const m = this.model, { x, y } = actor;
    if (y >= Profile.rows - 1) return true;
    const below = m.actAt(x, y + 1);
    return below === T.BRICK || below === T.SOLID || !!this.guardAt(x, y + 1);
  }
  blockedCell(x, y, isGuard) {
    const m = this.model;
    if (!m.inside(x, y)) return true;
    const a = m.actAt(x, y);
    if (a === T.BRICK || a === T.SOLID) return true;
    // false bricks refuse horizontal/upward entry but not falling entry
    if (m.baseAt(x, y) === T.TRAP && m.actAt(x, y) === T.TRAP) return true;
    if (isGuard && this.guardAt(x, y)) return true;
    return false;
  }

  /* ========================================================================
   * MovementSystem — shared stepping for runner and guards.
   * Per-tick offsets, half-tile commit, perpendicular auto-centering.
   * ====================================================================== */
  stepActor(actor, action) {
    const m = this.model, isGuard = actor.kind === "guard";
    let { x, y, xo, yo } = actor;
    let centerX = 0, centerY = 0;
    const curBase = m.baseAt(x, y);

    // clamp intended action against walls, decide stay-in-place
    let stay = false;
    if (action === A.UP) {
      stay = this.blockedCell(x, y - 1, isGuard);
      if (yo <= 0 && stay) action = A.STOP;
    } else if (action === A.DOWN || action === A.FALL || action === A.INHOLE) {
      stay = y >= Profile.rows - 1 || this.hardBelow(actor);
      // a refilling hole pins a guard even over open space: the closing
      // brick catches it, so it traps (and releases gold) instead of
      // passing through
      if (isGuard && !stay && curBase === T.BRICK) {
        const h = this.holeAt(x, y);
        if (h && h.phase === "fill") stay = true;
      }
      if (action === A.FALL && yo < 0 && curBase === T.BRICK && stay) {
        action = A.INHOLE;  // settling into a dug hole that has a floor;
                            // open-bottomed holes are fallen straight through
      } else if (action !== A.INHOLE && yo >= 0 && stay) action = A.STOP;
    } else if (action === A.LEFT) {
      stay = this.blockedCell(x - 1, y, isGuard);
      if (xo <= 0 && stay) action = A.STOP;
    } else if (action === A.RIGHT) {
      stay = this.blockedCell(x + 1, y, isGuard);
      if (xo >= 0 && stay) action = A.STOP;
    }
    if (action === A.UP || action === A.DOWN || action === A.FALL || action === A.INHOLE) {
      if (xo > 0) centerX = -1; else if (xo < 0) centerX = 1;
    } else if (action === A.LEFT || action === A.RIGHT) {
      if (yo > 0) centerY = -1; else if (yo < 0) centerY = 1;
    }

    let commitStep = false; // crossed a tile boundary this tick

    if (action === A.UP) {
      yo -= Profile.moveY;
      if (stay && yo < 0) yo = 0;
      else if (yo < -HH) { y--; yo += Profile.tileH; commitStep = true; }
    }
    if (centerX === -1) { xo = Math.max(0, xo - Profile.moveX); }
    if (centerX ===  1) { xo = Math.min(0, xo + Profile.moveX); }
    if (centerY === -1) { yo = Math.max(0, yo - Profile.moveY); }
    if (centerY ===  1) { yo = Math.min(0, yo + Profile.moveY); }

    if (action === A.DOWN || action === A.FALL || action === A.INHOLE) {
      let holdBar = false;
      if (curBase === T.BAR) {
        if (yo < 0) holdBar = true;
        else if (action === A.DOWN && y < Profile.rows - 1 &&
                 m.actAt(x, y + 1) !== T.LADDER && !this.guardAt(x, y + 1))
          action = A.FALL;    // stepping down off a bar releases into a fall
      }
      yo += Profile.moveY;
      if (holdBar && yo >= 0) { yo = 0; action = A.FALLBAR; }
      if (stay && action !== A.INHOLE && yo > 0) yo = 0;
      else if (stay && action === A.INHOLE && yo > 0) yo = 0;
      else if (yo > HH) { y++; yo -= Profile.tileH; commitStep = true; }
      // falling past a bar catches it exactly at center
      if (action === A.FALL && m.baseAt(x, y) === T.BAR && yo >= 0 && yo < Profile.moveY) {
        yo = 0; action = A.FALLBAR;
      }
    }
    if (action === A.LEFT) {
      xo -= Profile.moveX;
      if (stay && xo < 0) xo = 0;
      else if (xo < -HW) { x--; xo += Profile.tileW; commitStep = true; }
    }
    if (action === A.RIGHT) {
      xo += Profile.moveX;
      if (stay && xo > 0) xo = 0;
      else if (xo > HW) { x++; xo -= Profile.tileW; commitStep = true; }
    }

    if (action === A.LEFT) actor.facing = A.LEFT;
    if (action === A.RIGHT) actor.facing = A.RIGHT;
    if (action === A.INHOLE && commitStep) action = A.FALL; // hole had no floor

    actor.x = x; actor.y = y; actor.xo = xo; actor.yo = yo;
    if (action !== A.STOP) { actor.animT++; }
    actor.action = action;

    // falling into a false brick reveals it
    if (m.baseAt(x, y) === T.TRAP) {
      m.act[y][x] = T.EMPTY; m.revealTrap[y][x] = true;
    }
    // gold pickup near tile center (or just above a ladder top)
    if (m.baseAt(x, y) === T.GOLD) {
      const centered =
        (xo === 0 && yo >= 0 && yo < QH) ||
        (yo === 0 && xo >= 0 && xo < QW) ||
        (y < Profile.rows - 1 && m.baseAt(x, y + 1) === T.LADDER && yo < QH);
      if (centered) {
        if (isGuard) {
          if (!actor.hasGold) { // hasGold<0 is the post-drop cooldown
            actor.hasGold = Profile.goldDropMin +
              (Math.random() * (Profile.goldDropMax - Profile.goldDropMin + 1) | 0);
            m.base[y][x] = T.EMPTY; // carried, not collected: count unchanged
          }
        } else {
          m.removeGold(x, y);
          this.addScore(Profile.scoreGold);
          Audio.gold();
          this.checkGoldDone();
        }
      }
    }
    return commitStep;
  }

  checkGoldDone() {
    if (this.model.goldCount <= 0 && !this.model.goldDone) {
      this.model.revealExit();
      Audio.exit();
    }
  }

  /* ---------------- runner tick ---------------- */
  moveRunner() {
    const m = this.model, r = this.runner;
    // forced fall?
    const cur = m.baseAt(r.x, r.y);
    const onGrip = cur === T.LADDER || (cur === T.BAR && r.yo === 0);
    if (!onGrip && (r.yo < 0 || !this.supported(r))) {
      if (r.action !== A.FALL && r.action !== A.FALLBAR) Audio.fallStart();
      this.stepActor(r, A.FALL);
      this.postMoveChecks();
      return;
    }
    let want = this.keyAction;
    if (want === A.DIGL || want === A.DIGR) {
      const dir = want === A.DIGL ? -1 : 1;
      if (this.canDig(dir)) { this.startDig(dir); }
      this.keyAction = A.STOP;   // dig is a one-shot action
      this.postMoveChecks();
      return;
    }
    if (want === A.UP) {
      const below = m.baseAt(r.x, r.y + 1);
      const canUp = cur === T.LADDER || (r.yo > 0 && below === T.LADDER) ||
                    (r.yo > 0 && r.yo < QH && below === T.LADDER);
      if (!canUp) want = A.STOP;
    }
    if (want === A.DOWN && cur !== T.LADDER && cur !== T.BAR &&
        this.hardBelow(this.runner) && r.yo >= 0) want = A.STOP;
    this.stepActor(r, want);
    this.postMoveChecks();
  }

  postMoveChecks() {
    const r = this.runner;
    // proximity death (3/4 tile in both axes, matching observed behavior)
    for (const g of this.guards) {
      if (g.action === A.REBORN) continue;
      const dw = Math.abs((r.x * Profile.tileW + r.xo) - (g.x * Profile.tileW + g.xo));
      const dh = Math.abs((r.y * Profile.tileH + r.yo) - (g.y * Profile.tileH + g.yo));
      if (dw <= QW * 3 && dh <= QH * 3) { this.killRunner(); return; }
    }
    // level complete: all gold + reach the top row
    if (this.model.goldDone && r.y === 0 && r.yo === 0 && this.state === "running") {
      this.state = "done"; this.stateT = 0;
      this.addScore(Profile.scoreLevel);
      this.lives = Math.min(Profile.maxLives, this.lives + 1); // classic: +1 man per level
      Audio.complete();
    }
  }

  killRunner() {
    if (this.state !== "running") return;
    this.state = "dead"; this.stateT = 0;
    Audio.death();
  }

  /* ========================================================================
   * DigSystem
   * ====================================================================== */
  canDig(dir) {
    const m = this.model, r = this.runner;
    const tx = r.x + dir, ty = r.y + 1;
    if (!m.inside(tx, ty) || !m.inside(tx, r.y)) return false;
    if (!this.supported(r) || r.yo !== 0) return false;
    return m.actAt(tx, ty) === T.BRICK &&
           m.baseAt(tx, ty) === T.BRICK &&
           m.actAt(tx, r.y) === T.EMPTY &&
           m.baseAt(tx, r.y) !== T.GOLD &&
           !this.guardAt(tx, r.y) && !this.guardAt(tx, ty);
  }
  startDig(dir) {
    const r = this.runner;
    r.xo = 0; r.yo = 0;
    r.facing = dir < 0 ? A.LEFT : A.RIGHT;
    r.action = dir < 0 ? A.DIGL : A.DIGR;
    const hole = { x: r.x + dir, y: r.y + 1, phase: "dig", t: 0, stage: 0, dir };
    this.holes.push(hole);
    this.digging = hole;
    // act stays BRICK while digging; becomes EMPTY when the dig completes
    Audio.dig();
  }
  tickHoles() {
    const m = this.model;
    for (let i = this.holes.length - 1; i >= 0; i--) {
      const h = this.holes[i];
      h.t++;
      if (h.phase === "dig") {
        // a guard reaching the hole cancels an early dig
        const gOver = this.guardAt(h.x, h.y - 1);
        if (gOver && h.t < Profile.digCancelFrame) {
          m.act[h.y][h.x] = T.BRICK;
          this.holes.splice(i, 1);
          if (this.digging === h) { this.digging = null; this.runner.action = A.STOP; }
          continue;
        }
        if (h.t >= Profile.digTicks) {
          h.phase = "open"; h.t = 0;
          m.act[h.y][h.x] = T.EMPTY;
          if (this.digging === h) { this.digging = null; this.runner.action = A.STOP; }
        }
      } else if (h.phase === "open") {
        if (h.t >= Profile.holeOpenTicks) { h.phase = "fill"; h.t = 0; h.stage = 0; }
      } else { // fill
        if (h.t >= Profile.fillTicks[h.stage]) {
          h.t = 0; h.stage++;
          if (h.stage >= Profile.fillTicks.length) {
            // refill: bury whoever is inside
            m.act[h.y][h.x] = T.BRICK;
            this.holes.splice(i, 1);
            const r = this.runner;
            if (r.x === h.x && r.y === h.y) this.killRunner();
            const g = this.guardAt(h.x, h.y);
            if (g) this.guardDies(g);
          }
        }
      }
    }
  }
  holeAt(x, y) {
    for (const h of this.holes) if (h.x === x && h.y === y) return h;
    return null;
  }

  /* ========================================================================
   * GuardSystem — classic schedule + floor-scan pursuit (not BFS).
   * ====================================================================== */
  // per-tick guard move counts, cyclic table indexed by number of guards;
  // reproduces the classic speed ratios (1 guard = half runner speed, etc.)
  static movePolicy = [
    [0,0,0,0,0,0],
    [0,1,0,1,0,1],
    [1,1,1,1,1,1],
    [1,2,1,1,2,1],
    [1,2,2,1,2,2],
    [2,2,2,2,2,2],
  ];

  moveGuards() {
    const n = this.guards.length;
    if (!n) return;
    this.moveOffset = (this.moveOffset + 1) % 6;
    let moves = Game.movePolicy[Math.min(n, 5)][this.moveOffset];
    while (moves-- > 0) {
      this.moveId = (this.moveId + 1) % n;
      const g = this.guards[this.moveId];
      if (g.action === A.REBORN) { this.tickReborn(g); continue; }
      if (g.action === A.INHOLE) {
        if (g.yo < 0) {          // still settling into the hole
          this.stepActor(g, A.INHOLE);
          if (g.action === A.INHOLE && g.yo === 0) this.guardTrapped(g);
        } else if (g.yo === 0) this.tickTrapped(g);
        else g.action = A.FALL;  // hole floor was dug away mid-settle
        continue;
      }
      const act = this.bestMove(g);
      const crossed = this.stepActor(g, act);   // tile boundary crossed?
      if (crossed && g.hasGold) this.tickCarriedGold(g);
      if (g.action === A.INHOLE && g.yo === 0) this.guardTrapped(g);
    }
  }

  guardTrapped(g) {
    g.yo = 0; g.shakeT = 0; g.shakeIdx = -1;
    g.holeX = g.x; g.holeY = g.y;
    // gold falls out onto the cell above the hole, or is destroyed —
    // destroyed gold is written off so it can't block the exit forever
    if (g.hasGold > 0) {
      const m = this.model;
      if (g.y > 0 && m.baseAt(g.x, g.y - 1) === T.EMPTY && m.actAt(g.x, g.y - 1) === T.EMPTY)
        m.addGold(g.x, g.y - 1);
      else { m.goldCount--; this.checkGoldDone(); }
    }
    g.hasGold = 0;
    this.addScore(Profile.scoreTrap);
    Audio.trap();
  }
  tickTrapped(g) {
    g.shakeT++;
    const total = Profile.shakeStillTicks +
      Profile.shakeAnimTicks.reduce((a, b) => a + b, 0);
    if (g.shakeT > total) {
      g.action = A.CLIMB;
    }
  }
  tickReborn(g) {
    if (--g.rebornT <= 0) {
      g.action = A.FALL;
      if (g.x === this.runner.x && g.y === this.runner.y) this.killRunner();
      Audio.reborn();
    }
  }
  guardDies(g) {
    this.addScore(Profile.scoreGuardDead);
    if (g.hasGold > 0) { this.model.goldCount--; this.checkGoldDone(); } // carried gold destroyed
    g.hasGold = 0;
    // respawn at a random empty column near the top
    const m = this.model;
    let y = 1, x = Math.random() * Profile.cols | 0, tries = 0;
    while (m.actAt(x, y) !== T.EMPTY || m.baseAt(x, y) === T.GOLD ||
           this.guardAt(x, y) || (x === this.runner.x && y === this.runner.y)) {
      x = Math.random() * Profile.cols | 0;
      if (++tries > Profile.cols) { tries = 0; y++; if (y >= Profile.rows) { y = 1; break; } }
    }
    g.x = x; g.y = y; g.xo = 0; g.yo = 0;
    g.action = A.REBORN; g.rebornT = Profile.rebornTicks;
    g.holeX = g.holeY = -1;
    Audio.guardDead();
  }
  tickCarriedGold(g) {
    if (g.hasGold < 0) { g.hasGold++; return; } // cooldown before re-pickup
    if (g.hasGold > 1) { g.hasGold--; return; }
    if (g.hasGold === 1) {
      const m = this.model;
      const below = g.y >= Profile.rows - 1 ? T.SOLID : m.baseAt(g.x, g.y + 1);
      if (m.baseAt(g.x, g.y) === T.EMPTY && m.actAt(g.x, g.y) === T.EMPTY &&
          (below === T.BRICK || below === T.SOLID || below === T.LADDER)) {
        m.addGold(g.x, g.y); g.hasGold = -1; // back on the map, still owed
      }
    }
  }

  /* Classic pursuit policy (reimplemented from behavior notes):
   * 1. must-fall check
   * 2. same-row walk-toward-runner if the row scan (ignoring walls' reach
   *    logic) connects
   * 3. otherwise scan the floor span; rate descents and ladder climbs:
   *    reaches runner's row -> |dx|; above -> dy+100; below -> dy+200.
   */
  bestMove(g) {
    const m = this.model, r = this.runner;
    const maxY = Profile.rows - 1, maxX = Profile.cols - 1;

    // climbing out of a hole: tracked by holeX/holeY so it survives the
    // action changing to LEFT/RIGHT while still over the hole column
    if (g.holeX >= 0) {
      if (g.y === g.holeY) return A.UP;
      if (g.x === g.holeX) {
        // step off the hole column; prefer the runner's side, else any open side
        const dir = r.x < g.x ? A.LEFT : A.RIGHT;
        const dx = dir === A.LEFT ? -1 : 1;
        if (!this.blockedCell(g.x + dx, g.y, true)) return dir;
        if (!this.blockedCell(g.x - dx, g.y, true)) return dir === A.LEFT ? A.RIGHT : A.LEFT;
        return A.STOP;
      }
      g.holeX = g.holeY = -1; // clear of the hole
    }

    const cur = m.baseAt(g.x, g.y);
    const onGrip = cur === T.LADDER || (cur === T.BAR && g.yo === 0);
    if (!onGrip) {
      if (g.yo < 0) return A.FALL;
      if (g.y < maxY) {
        const below = m.actAt(g.x, g.y + 1);
        const held = below === T.BRICK || below === T.SOLID || below === T.LADDER ||
                     !!this.guardAt(g.x, g.y + 1);
        if (!held) return A.FALL;
      }
    }

    // same-floor direct pursuit
    if (g.y === r.y && r.action !== A.FALL) {
      let x = g.x;
      while (x !== r.x) {
        const below = g.y < maxY ? m.baseAt(x, g.y + 1) : T.SOLID;
        const here = m.baseAt(x, g.y);
        const walkable = here === T.LADDER || here === T.BAR ||
          below === T.SOLID || below === T.LADDER || below === T.BRICK ||
          below === T.BAR || below === T.GOLD || !!this.guardAt(x, g.y + 1);
        if (!walkable) break;
        x += x < r.x ? 1 : -1;
      }
      if (x === r.x) {
        if (g.x < r.x) return A.RIGHT;
        if (g.x > r.x) return A.LEFT;
        return g.xo < r.xo ? A.RIGHT : A.LEFT;
      }
    }
    return this.scanFloor(g);
  }

  scanFloor(g) {
    const m = this.model, r = this.runner;
    const maxY = Profile.rows - 1, maxX = Profile.cols - 1;
    const startX = g.x, startY = g.y;
    let best = 255, bestPath = A.STOP;

    const rate = (endY, endX, path) => {
      let score;
      if (endY === r.y) score = Math.abs(startX - endX);
      else if (endY > r.y) score = endY - r.y + 200;
      else score = r.y - endY + 100;
      if (score < best) { best = score; bestPath = path; }
    };
    const walkableBelow = (x, y) => {
      if (y >= maxY) return true;
      const b = m.baseAt(x, y + 1);
      return b === T.BRICK || b === T.SOLID || b === T.LADDER;
    };
    const scanDown = (x, path) => {
      let y = startY;
      while (y < maxY) {
        const below = m.baseAt(x, y + 1);
        if (below === T.BRICK || below === T.SOLID) break;
        const here = m.baseAt(x, y);
        if (here !== T.EMPTY && here !== T.HLADDER) {
          const sideOk = (x > 0 && (walkableBelow(x - 1, y) || m.baseAt(x - 1, y) === T.BAR)) ||
                         (x < maxX && (walkableBelow(x + 1, y) || m.baseAt(x + 1, y) === T.BAR));
          if (sideOk && y >= r.y) break;
        }
        y++;
      }
      rate(y, x, path);
    };
    const scanUp = (x, path) => {
      let y = startY;
      while (y > 0 && m.baseAt(x, y) === T.LADDER) {
        y--;
        const sideOk = (x > 0 && (walkableBelow(x - 1, y) || m.baseAt(x - 1, y) === T.BAR)) ||
                       (x < maxX && (walkableBelow(x + 1, y) || m.baseAt(x + 1, y) === T.BAR));
        if (sideOk && y <= r.y) break;
      }
      rate(y, x, path);
    };

    // find floor span ends (walk until wall; one step past a drop-off)
    let left = startX;
    while (left > 0) {
      const t = m.actAt(left - 1, startY);
      if (t === T.BRICK || t === T.SOLID) break;
      const grip = t === T.LADDER || t === T.BAR;
      left--;
      if (!grip && startY < maxY && !walkableBelow(left, startY)) break;
    }
    let right = startX;
    while (right < maxX) {
      const t = m.actAt(right + 1, startY);
      if (t === T.BRICK || t === T.SOLID) break;
      const grip = t === T.LADDER || t === T.BAR;
      right++;
      if (!grip && startY < maxY && !walkableBelow(right, startY)) break;
    }

    // middle first, then both arms — first-found wins ties (learnable AI)
    if (startY < maxY) {
      const below = m.baseAt(startX, startY + 1);
      if (below !== T.BRICK && below !== T.SOLID) scanDown(startX, A.DOWN);
    }
    if (m.baseAt(startX, startY) === T.LADDER) scanUp(startX, A.UP);
    for (let x = left; x < startX; x++) {
      if (startY < maxY) {
        const below = m.baseAt(x, startY + 1);
        if (below !== T.BRICK && below !== T.SOLID) scanDown(x, A.LEFT);
      }
      if (m.baseAt(x, startY) === T.LADDER) scanUp(x, A.LEFT);
    }
    for (let x = right; x > startX; x--) {
      if (startY < maxY) {
        const below = m.baseAt(x, startY + 1);
        if (below !== T.BRICK && below !== T.SOLID) scanDown(x, A.RIGHT);
      }
      if (m.baseAt(x, startY) === T.LADDER) scanUp(x, A.RIGHT);
    }
    return bestPath;
  }

  /* ========================================================================
   * GameStateMachine + main tick
   * ====================================================================== */
  addScore(n) { this.score += n; }

  tick() {
    this.blink++;
    switch (this.state) {
      case "ready":
        if (this.keyAction !== A.STOP) { this.state = "running"; }
        break;
      case "running":
        if (this.digging) {
          this.tickHoles();
        } else {
          this.moveRunner();
          this.tickHoles();
        }
        if (this.state === "running" || this.state === "done") {
          this.moveGuards();
          if (this.state === "running") this.postMoveChecks();
        }
        break;
      case "dead":
        if (++this.stateT > Profile.tickHz) {
          this.lives--;
          if (this.lives <= 0) { this.state = "over"; this.stateT = 0; }
          else this.loadLevel(this.levelIdx);
        }
        break;
      case "done":
        if (++this.stateT > Profile.tickHz * 1.2) {
          if (this.levelIdx + 1 >= this.levels.length) { this.state = "win"; this.stateT = 0; }
          else this.loadLevel(this.levelIdx + 1);
        }
        break;
      case "over":
      case "win":
        this.stateT++;
        break;
      case "paused":
        break;
    }
  }

  /* ---------------- input ---------------- */
  onKey(e, down) {
    const k = e.key;
    const dirs = { ArrowLeft: A.LEFT, ArrowRight: A.RIGHT, ArrowUp: A.UP, ArrowDown: A.DOWN };
    if (k in dirs || k === " ") e.preventDefault();
    if (!down) {
      this.heldKeys.delete(k);
      if (dirs[k] === this.keyAction || (k === " " && (this.keyAction === A.DIGL || this.keyAction === A.DIGR))) {
        // fall back to another held direction, else stop
        this.keyAction = A.STOP;
        for (const h of this.heldKeys) if (dirs[h]) this.keyAction = dirs[h];
      }
      if (k === "z" || k === "Z" || k === "u" || k === "U" ||
          k === "x" || k === "X" || k === "o" || k === "O") {
        if (this.keyAction === A.DIGL || this.keyAction === A.DIGR) this.keyAction = A.STOP;
      }
      return;
    }
    this.heldKeys.add(k);
    Audio.ensure();
    if (this.state === "over" || this.state === "win") {
      if (k === "Enter") { this.score = 0; this.lives = Profile.lives; this.loadLevel(0); }
      return;
    }
    if (k === "p" || k === "P") {
      if (this.state === "running") this.state = "paused";
      else if (this.state === "paused") this.state = "running";
      return;
    }
    if (k === "t" || k === "T") {
      this.themeIdx = (this.themeIdx + 1) % Themes.length;
      localStorage.setItem("clone_theme", this.themeIdx);
      return;
    }
    if (k === "m" || k === "M") {
      this.muted = !this.muted;
      localStorage.setItem("clone_muted", this.muted ? "1" : "0");
      return;
    }
    if (k === ",") { this.loadLevel(this.levelIdx - 1); return; }
    if (k === ".") { this.loadLevel(this.levelIdx + 1); return; }
    if (k === "r" || k === "R") {
      if (this.state === "running" || this.state === "ready") {
        this.lives--;
        if (this.lives <= 0) { this.state = "over"; this.stateT = 0; }
        else this.loadLevel(this.levelIdx);
      }
      return;
    }
    if (this.state === "paused") return;
    if (dirs[k]) this.keyAction = dirs[k];
    else if (k === "z" || k === "Z" || k === "u" || k === "U") this.keyAction = A.DIGL;
    else if (k === "x" || k === "X" || k === "o" || k === "O") this.keyAction = A.DIGR;
    else if (k === " ")
      this.keyAction = this.runner.facing === A.LEFT ? A.DIGL : A.DIGR;
  }
}

/* ==========================================================================
 * AudioSystem — synthesized square-wave effects (original, not sampled).
 * ======================================================================== */
const Audio = {
  ctx: null,
  ensure() {
    if (!this.ctx) {
      try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { this.ctx = null; }
    }
    if (this.ctx && this.ctx.state === "suspended") this.ctx.resume();
  },
  blip(freqs, dur, type = "square", vol = 0.05) {
    if (!this.ctx || game.muted) return;
    const t0 = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    freqs.forEach((f, i) =>
      osc.frequency.setValueAtTime(f, t0 + (dur * i) / freqs.length));
    gain.gain.setValueAtTime(vol, t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain).connect(this.ctx.destination);
    osc.start(t0); osc.stop(t0 + dur);
  },
  gold()      { this.blip([660, 880, 1320], 0.14); },
  dig()       { this.blip([220, 180, 150, 120], 0.28, "sawtooth", 0.04); },
  fallStart() { this.blip([500, 380, 260], 0.20, "square", 0.025); },
  trap()      { this.blip([160, 110], 0.18, "square", 0.05); },
  death()     { this.blip([440, 330, 220, 110, 55], 0.7, "square", 0.06); },
  reborn()    { this.blip([330, 440], 0.12, "square", 0.03); },
  guardDead() { this.blip([200, 140, 90], 0.25, "square", 0.05); },
  exit()      { this.blip([523, 659, 784, 1046], 0.4, "square", 0.05); },
  complete()  { this.blip([523, 659, 784, 1046, 1318, 1568], 0.8, "square", 0.06); },
};

/* ==========================================================================
 * Renderer + Themes
 * Each theme provides colors and tile/actor/status painters.
 * Coordinates given in logical px; painters draw one tile at (0,0)..(40,44).
 * ======================================================================== */
const PX = 4; // pixel-art unit

function drawActorShape(ctx, actor, colors, tick) {
  // Parametric stick-figure pixel sprite, drawn in tile-local coordinates.
  const c = actor.kind === "guard" ? colors.guard : colors.runner;
  const f = actor.animT >> 1;
  const facing = actor.facing === A.LEFT ? -1 : 1;
  const px = (x, y, w, h, col) => { ctx.fillStyle = col || c; ctx.fillRect(x * PX, y * PX, w * PX, h * PX); };
  const mid = 5 - 1; // body center column in 10x11 grid

  const hanging = actor.action === A.FALLBAR ||
    (game.model.baseAt(actor.x, actor.y) === T.BAR && actor.yo === 0 &&
     (actor.action === A.LEFT || actor.action === A.RIGHT || actor.action === A.STOP));
  const climbing = actor.action === A.UP || actor.action === A.DOWN ||
    (game.model.baseAt(actor.x, actor.y) === T.LADDER &&
      actor.action !== A.FALL && actor.action !== A.LEFT && actor.action !== A.RIGHT && !hanging);
  const digging = actor.action === A.DIGL || actor.action === A.DIGR;
  const falling = actor.action === A.FALL;
  const trapped = actor.action === A.INHOLE;

  if (hanging) {
    px(mid, 2, 2, 1);                    // hands at bar
    px(mid, 3, 2, 3);                    // body below
    px(mid - 1 + (f % 2), 6, 1, 3); px(mid + 1 + ((f + 1) % 2), 6, 1, 3);
    px(mid, 1, 2, 1, colors.head || c);  // head at bar line? keep under
    return;
  }
  // head
  px(mid, 1, 2, 2, colors.head || c);
  if (actor.kind === "guard") px(mid - 1, 1, 4, 1, colors.hat || c); // cap brim
  // torso
  px(mid, 3, 2, 4);
  if (climbing) {
    const alt = f % 2;
    px(mid - 1, 3 + alt, 1, 3); px(mid + 2, 4 - alt, 1, 3);      // arms
    px(mid, 7, 1, 3 - alt); px(mid + 1, 7, 1, 2 + alt);          // legs
  } else if (digging) {
    const ax = facing > 0 ? mid + 2 : mid - 2;
    px(ax, 4, 2 * facing, 1);                                    // arm out
    px(mid, 7, 1, 3); px(mid + 1, 7, 1, 3);
  } else if (falling) {
    px(mid - 2, 3, 1, 2); px(mid + 3, 3, 1, 2);                  // arms up
    px(mid, 7, 1, 2); px(mid + 1, 8, 1, 2);
  } else if (trapped) {
    const w = (tick >> 2) % 2 ? 1 : -1;
    px(mid - 2 * w, 3, 1, 2);
    px(mid, 7, 1, 2); px(mid + 1, 7, 1, 2);
  } else if (actor.action === A.LEFT || actor.action === A.RIGHT) {
    const stride = f % 2;
    px(mid - facing, 4, 1, 2);                                   // trailing arm
    if (stride) { px(mid - 1, 7, 1, 3); px(mid + 2, 7, 1, 2); }
    else { px(mid, 7, 1, 3); px(mid + 1, 7, 1, 3); }
  } else {
    px(mid - 1, 4, 1, 2); px(mid + 2, 4, 1, 2);
    px(mid, 7, 1, 3); px(mid + 1, 7, 1, 3);
  }
}

function brickMortar(ctx, fill, mortar, w, h) {
  ctx.fillStyle = fill; ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = mortar;
  const rowH = h / 4;
  for (let r = 0; r < 4; r++) {
    ctx.fillRect(0, r * rowH, w, 2);
    const off = (r % 2) ? w / 2 : 0;
    ctx.fillRect((off + w / 4) % w, r * rowH, 2, rowH);
    ctx.fillRect((off + 3 * w / 4) % w, r * rowH, 2, rowH);
  }
}

const AppleIITheme = {
  name: "APPLE II",
  page: "#000000", field: "#000000",
  colors: { runner: "#ffffff", guard: "#2f8cff", head: null, hat: "#77b7ff" },
  statusInk: "#ffffff", statusBg: "#000000",
  drawTile(ctx, t, opts) {
    const w = Profile.tileW, h = Profile.tileH;
    switch (t) {
      case T.BRICK: brickMortar(ctx, "#d24a12", "#5e1c02", w, h); break;
      case T.SOLID:
        ctx.fillStyle = "#0f52c8"; ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = "#3f82f8"; ctx.fillRect(0, 0, w, 4); ctx.fillRect(0, 0, 4, h);
        ctx.fillStyle = "#082a68"; ctx.fillRect(0, h - 4, w, 4); ctx.fillRect(w - 4, 0, 4, h);
        break;
      case T.LADDER: this.ladder(ctx, "#ffffff"); break;
      case T.BAR: ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 4, w, 4); break;
      case T.TRAP:
        if (opts.revealed) {
          brickMortar(ctx, "#571e07", "#200b02", w, h);
          ctx.fillStyle = "rgba(0,0,0,0.55)"; ctx.fillRect(0, 0, w, h);
        } else brickMortar(ctx, "#d24a12", "#5e1c02", w, h);
        break;
      case T.GOLD:
        ctx.fillStyle = "#ffd24a"; ctx.fillRect(8, 26, 24, 14);
        ctx.fillStyle = "#a86e00"; ctx.fillRect(8, 26, 24, 4);
        ctx.fillStyle = "#fff2c0"; ctx.fillRect(12, 32, 6, 4);
        break;
    }
  },
  ladder(ctx, col) {
    const w = Profile.tileW, h = Profile.tileH;
    ctx.fillStyle = col;
    ctx.fillRect(4, 0, 5, h); ctx.fillRect(w - 9, 0, 5, h);
    for (let y = 6; y < h; y += 14) ctx.fillRect(4, y, w - 8, 4);
  },
  drawGround(ctx, w, h) {
    ctx.fillStyle = "#d24a12"; ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = "#5e1c02";
    for (let x = 0; x < w; x += 40) ctx.fillRect(x, 0, 2, h);
    ctx.fillRect(0, 0, w, 2);
  },
  drawStatus(ctx, info, w, h) {
    ctx.fillStyle = this.statusBg; ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = this.statusInk;
    ctx.font = "bold 30px ui-monospace, Menlo, monospace";
    ctx.textBaseline = "middle";
    ctx.fillText(`SCORE ${String(info.score).padStart(7, "0")}`, 24, h / 2);
    ctx.fillText(`MEN ${String(info.lives).padStart(3, "0")}`, w / 2 - 60, h / 2);
    ctx.fillText(`LEVEL ${String(info.level).padStart(3, "0")}`, w - 300, h / 2);
  },
};

const MacMonoTheme = {
  name: "MONOCHROME",
  page: "#3a3a3e", field: "#ffffff",
  colors: { runner: "#000000", guard: "#000000", head: null, hat: "#000000" },
  statusInk: "#000000", statusBg: "#ffffff",
  drawTile(ctx, t, opts) {
    const w = Profile.tileW, h = Profile.tileH;
    switch (t) {
      case T.BRICK: brickMortar(ctx, "#000000", "#ffffff", w, h); break;
      case T.SOLID:
        ctx.fillStyle = "#000000"; ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = "#ffffff";
        for (let y = 2; y < h; y += 8)
          for (let x = (y % 16) ? 2 : 6; x < w; x += 8) ctx.fillRect(x, y, 2, 2);
        break;
      case T.LADDER:
        ctx.strokeStyle = "#000000"; ctx.lineWidth = 3;
        ctx.strokeRect(6.5, -1, 4, h + 2); ctx.strokeRect(w - 10.5, -1, 4, h + 2);
        ctx.beginPath();
        for (let y = 6; y < h; y += 12) { ctx.moveTo(8, y); ctx.lineTo(w - 8, y); }
        ctx.stroke();
        break;
      case T.BAR:
        ctx.fillStyle = "#000000"; ctx.fillRect(0, 5, w, 3);
        break;
      case T.TRAP:
        brickMortar(ctx, "#000000", "#ffffff", w, h);
        if (opts.revealed) {
          ctx.fillStyle = "rgba(255,255,255,0.72)"; ctx.fillRect(0, 0, w, h);
        }
        break;
      case T.GOLD: // money bag with $
        ctx.fillStyle = "#ffffff"; ctx.strokeStyle = "#000000"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(w / 2, 30, 10, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#000000";
        ctx.fillRect(w / 2 - 4, 16, 8, 4);
        ctx.font = "bold 15px ui-monospace, monospace";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("$", w / 2, 31);
        ctx.textAlign = "left";
        break;
    }
  },
  drawGround(ctx, w, h) { // checkered strip like the reference footage border
    ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = "#000000";
    for (let y = 0; y < h; y += 4)
      for (let x = (y % 8) ? 4 : 0; x < w; x += 8) ctx.fillRect(x, y, 4, 4);
  },
  drawStatus(ctx, info, w, h) {
    ctx.fillStyle = this.statusBg; ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = this.statusInk;
    ctx.font = "bold 34px ui-monospace, Menlo, monospace";
    ctx.textBaseline = "middle";
    // approximation of the chunky one-line strip seen in the footage
    ctx.fillText(`SCORE${String(info.score).padStart(7, "0")}`, 20, h / 2);
    ctx.fillText(`MEN${String(info.lives).padStart(3, "0")}`, w / 2 - 30, h / 2);
    ctx.fillText(`LEVEL${String(info.level).padStart(3, "0")}`, w - 290, h / 2);
    ctx.strokeStyle = "#000000"; ctx.lineWidth = 3;
    ctx.strokeRect(6, 4, w - 12, h - 8);
  },
};

const NeonTheme = {
  name: "NEON",
  page: "#07070d", field: "#0b0f1e",
  colors: { runner: "#22ffd4", guard: "#ff3860", head: null, hat: "#ff7a9a" },
  statusInk: "#22ffd4", statusBg: "#080b16",
  drawTile(ctx, t, opts) {
    const w = Profile.tileW, h = Profile.tileH;
    switch (t) {
      case T.BRICK:
        ctx.fillStyle = "#1b2440"; ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = "#e14fff"; ctx.lineWidth = 2;
        ctx.strokeRect(2, 2, w - 4, h - 4);
        ctx.strokeStyle = "#5a2a86";
        ctx.beginPath(); ctx.moveTo(2, h / 2); ctx.lineTo(w - 2, h / 2); ctx.stroke();
        break;
      case T.SOLID:
        ctx.fillStyle = "#252a33"; ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = "#67f7ff"; ctx.lineWidth = 2; ctx.strokeRect(2, 2, w - 4, h - 4);
        break;
      case T.LADDER: AppleIITheme.ladder.call(AppleIITheme, ctx, "#67f7ff"); break;
      case T.BAR: ctx.fillStyle = "#67f7ff"; ctx.fillRect(0, 4, w, 4); break;
      case T.TRAP:
        ctx.fillStyle = "#1b2440"; ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = opts.revealed ? "#41304f" : "#e14fff";
        ctx.lineWidth = 2; ctx.strokeRect(2, 2, w - 4, h - 4);
        if (opts.revealed) { ctx.fillStyle = "rgba(11,15,30,0.7)"; ctx.fillRect(0, 0, w, h); }
        break;
      case T.GOLD:
        ctx.fillStyle = "#ffb824"; ctx.fillRect(10, 26, 20, 12);
        ctx.fillStyle = "#fff3d0"; ctx.fillRect(14, 29, 5, 3);
        break;
    }
  },
  drawGround(ctx, w, h) {
    ctx.fillStyle = "#0b0f1e"; ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = "#e14fff"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, 2); ctx.lineTo(w, 2); ctx.stroke();
  },
  drawStatus(ctx, info, w, h) {
    ctx.fillStyle = this.statusBg; ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = this.statusInk;
    ctx.font = "bold 28px ui-monospace, Menlo, monospace";
    ctx.textBaseline = "middle";
    ctx.fillText(`SCORE ${String(info.score).padStart(7, "0")}`, 24, h / 2);
    ctx.fillText(`MEN ${String(info.lives).padStart(3, "0")}`, w / 2 - 50, h / 2);
    ctx.fillText(`LEVEL ${String(info.level).padStart(3, "0")}`, w - 280, h / 2);
  },
};

const Themes = [AppleIITheme, MacMonoTheme, NeonTheme];

const Renderer = {
  draw(game) {
    const ctx = game.ctx, th = Themes[game.themeIdx];
    const m = game.model;
    const W = Profile.playW, H = Profile.playH;
    document.body.style.background = th.page;
    ctx.save();
    ctx.fillStyle = th.field; ctx.fillRect(0, 0, W, H);

    // terrain
    for (let y = 0; y < Profile.rows; y++) {
      for (let x = 0; x < Profile.cols; x++) {
        const t = m.base[y][x];
        const hole = game.holeAt(x, y);
        if (t === T.HLADDER || t === T.EMPTY) continue; // hidden/empty: nothing

        ctx.save();
        ctx.translate(x * Profile.tileW, y * Profile.tileH);
        if (hole) this.drawHole(ctx, th, hole);
        else th.drawTile(ctx, t, { revealed: m.revealTrap[y][x] });
        ctx.restore();
      }
    }
    // actors
    const drawA = (a) => {
      if (a.action === A.REBORN) {
        if ((game.blink >> 1) % 2) return;          // reborn flicker
      }
      ctx.save();
      ctx.translate(a.x * Profile.tileW + a.xo, a.y * Profile.tileH + a.yo);
      drawActorShape(ctx, a, th.colors, game.blink);
      if (a.kind === "guard" && a.hasGold > 0) {
        ctx.fillStyle = th.colors.runner;           // small carried-gold marker
        ctx.fillRect(14, 0, 12, 4);
      }
      ctx.restore();
    };
    for (const g of game.guards) drawA(g);
    const rBlink = game.state === "ready" && (game.blink >> 2) % 2 === 0;
    if (!rBlink && game.state !== "dead" || game.state === "dead" && game.stateT < 4)
      drawA(game.runner);

    // ground strip + status
    ctx.save();
    ctx.translate(0, H);
    th.drawGround(ctx, W, Profile.groundH);
    ctx.restore();
    ctx.save();
    ctx.translate(0, H + Profile.groundH);
    th.drawStatus(ctx, {
      score: game.score, lives: Math.max(0, game.lives),
      level: game.levelIdx + 1,
    }, W, Profile.statusH);
    ctx.restore();

    // overlays
    const overlay = (lines) => {
      ctx.fillStyle = "rgba(0,0,0,0.72)";
      ctx.fillRect(W / 2 - 300, H / 2 - 90, 600, 180);
      ctx.strokeStyle = th.colors.runner; ctx.lineWidth = 2;
      ctx.strokeRect(W / 2 - 300, H / 2 - 90, 600, 180);
      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.font = "bold 34px ui-monospace, monospace";
      lines.forEach((ln, i) =>
        ctx.fillText(ln, W / 2, H / 2 - 30 + i * 44));
      ctx.textAlign = "left";
    };
    if (game.state === "ready")
      overlay([game.model.name || `LEVEL ${game.levelIdx + 1}`, "MOVE TO BEGIN"]);
    else if (game.state === "paused") overlay(["PAUSED", "PRESS P"]);
    else if (game.state === "over") overlay(["GAME OVER", "PRESS ENTER"]);
    else if (game.state === "win") overlay(["YOU CLEARED THE CAMPAIGN!", "PRESS ENTER"]);
    ctx.restore();
  },
  drawHole(ctx, th, hole) {
    const w = Profile.tileW, h = Profile.tileH;
    if (hole.phase === "dig") {
      const p = hole.t / Profile.digTicks;         // brick crumbles downward
      ctx.save();
      ctx.beginPath(); ctx.rect(0, h * p, w, h * (1 - p)); ctx.clip();
      th.drawTile(ctx, T.BRICK, {});
      ctx.restore();
    } else if (hole.phase === "fill") {
      const done = hole.stage / Profile.fillTicks.length;
      const p = (hole.stage + hole.t / Profile.fillTicks[hole.stage]) / Profile.fillTicks.length;
      ctx.save();
      ctx.beginPath(); ctx.rect(0, h * (1 - p), w, h * p); ctx.clip();
      th.drawTile(ctx, T.BRICK, {});
      ctx.restore();
    }
    // open: draw nothing (empty)
  },
};

/* ==========================================================================
 * External levels — ONE level per file in ./levels/, discovered by probing
 * numbered filenames (no manifest, no build step). Loading uses <script src>
 * so it works on GitHub Pages, any static server, AND file:// (double-click),
 * where fetch() would be blocked.
 *
 * A level file is the plain-text format wrapped in one call:
 *   registerTextLevel(`
 *   11. LEVEL NAME
 *   ----------------------------
 *   <up to 16 map rows, 28 cols: space # @ H - X S $ 0 &>
 *   `);
 *
 * Filenames carry the campaign level number:
 *   levels/level-011.js, level-012.js, …   (campaign continuation)
 *   levels/custom-021.js, custom-022.js, … (custom levels)
 * The campaign is: 10 embedded levels, then every found file sorted by its
 * filename number. Add or remove files and reload — the campaign follows.
 * Missing numbers in the probe window (011–060) are silent no-ops.
 * ======================================================================== */
function parseTextLevel(text) {
  const lines = text.split(/\r?\n/);
  while (lines.length && !lines[0].trim()) lines.shift();
  if (!lines.length) return null;
  const name = lines.shift().trim();
  if (!lines.length || !/^-{4,}\s*$/.test(lines[0])) return null;
  lines.shift();
  while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
  return { name, map: lines.slice(0, Profile.rows) };
}

const externalLevels = new Map(); // filename -> level
window.registerTextLevel = function (text) {
  const src = (typeof document !== "undefined" && document.currentScript &&
               document.currentScript.src) || "external-" + externalLevels.size;
  const file = src.split("/").pop().split("?")[0];
  const level = parseTextLevel(text);
  if (level) externalLevels.set(file, level);
};

function fileNumber(f) { const m = f.match(/-(\d+)\.js$/); return m ? +m[1] : 9999; }
function finalizeExternalLevels() {
  const files = [...externalLevels.keys()]
    .sort((a, b) => fileNumber(a) - fileNumber(b) || a.localeCompare(b));
  for (const f of files)
    registerLevelPack(f.replace(/\.js$/, "").toUpperCase(), [externalLevels.get(f)]);
  game.refreshCampaign();
}
function probeExternalLevels() {
  const candidates = [];
  for (let n = 11; n <= 60; n++) {
    const w = String(n).padStart(3, "0");
    candidates.push(`level-${w}.js`, `custom-${w}.js`);
  }
  let pending = candidates.length;
  const settle = () => { if (--pending === 0) finalizeExternalLevels(); };
  for (const f of candidates) {
    const s = document.createElement("script");
    s.src = "levels/" + f;
    s.onload = settle;
    s.onerror = () => { s.remove(); settle(); };
    document.body.appendChild(s);
  }
}

/* ==========================================================================
 * Boot — fixed timestep loop at Profile.tickHz, rendered per frame.
 * ======================================================================== */
const game = new Game(document.getElementById("stage"));
window.addEventListener("keydown", e => game.onKey(e, true));
window.addEventListener("keyup", e => game.onKey(e, false));

let last = performance.now(), acc = 0;
function frame(now) {
  acc += Math.min(250, now - last); last = now;
  const step = 1000 / Profile.tickHz;
  while (acc >= step) { game.tick(); acc -= step; }
  Renderer.draw(game);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// expose for harnesses / extension
window.CloneGame = { game, Profile, LevelModel, registerLevelPack,
                     campaignLevels, Themes, parseTextLevel };
if (typeof document !== "undefined" && document.createElement && document.body)
  probeExternalLevels();
